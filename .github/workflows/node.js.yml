# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
  NODE_VERSION: 24.x
  TURBO_TELEMETRY_DISABLED: 1
  BACKEND_CONTAINER: tasksync-backend
  BACKEND_IMAGE: tasksync-backend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Use Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.NODE_VERSION }}
        package-manager-cache: false
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
    - run: npm test
      
  playwright-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout .NET Backend
      uses: actions/checkout@v5
      with:
        repository: kemalk89/TaskSync
        path: dotnet-backend

    - name: Start .NET Backend Dependencies with Docker Compose
      run: docker compose up -d
      working-directory: dotnet-backend

    - name: Build .NET Backend Docker image
      run: docker build -t ${{ env.BACKEND_IMAGE }} -f Dockerfile .
      working-directory: dotnet-backend

    - name: Start .NET Backend with Docker
      run: |
        docker run -d --name ${{ env.BACKEND_CONTAINER }} \
          -e Auth__MetadataAddress=http://host.docker.internal:3002/.well-known/openid-configuration \
          -e Auth__Authority=http://host.docker.internal:3002 \
          -e Auth__Audience=https://tasksync.api.de/api \
          -e Auth__MachineToMachineApplication__Domain=http://host.docker.internal:3002 \
          -e Auth__MachineToMachineApplication__ClientId=tasksync_e2e \
          -e Auth__MachineToMachineApplication__ClientSecret=any \
          -e LocalAuth__JwtSecret=0123456789abcdefghijklmnopqrstuv \
          -e ASPNETCORE_ENVIRONMENT=Development \
          -e ConnectionStrings__db="Host=host.docker.internal;Port=5432;Database=postgres;Username=postgres;Password=postgres" \
          --add-host=host.docker.internal:host-gateway \
          -p 8080:8080 \
          ${{ env.BACKEND_IMAGE }} 
      working-directory: dotnet-backend

    - uses: actions/checkout@v5
    - name: Use Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.NODE_VERSION }}
        package-manager-cache: false
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Generate AUTH_SECRET for web
      run: |
        echo "AUTH_SECRET=$(openssl rand -base64 32)" > ./apps/web/.env

    # - name: Wait for backend to be ready
    #  run: sleep 10

    - name: Create .env file for local-auth
      run: |
        echo "DB_HOST=localhost"                            > ./apps/local-auth/.env
        echo "DB_PORT=5432"                                 >> ./apps/local-auth/.env
        echo "DB_USER=postgres"                             >> ./apps/local-auth/.env
        echo "DB_PW=postgres"                               >> ./apps/local-auth/.env
        echo "DB_NAME=postgres"                             >> ./apps/local-auth/.env
        echo "TOKEN_ISSUER=http://localhost:3003"           >> ./apps/local-auth/.env
        echo "JWT_SECRET=0123456789abcdefghijklmnopqrstuv"  >> ./apps/local-auth/.env
        echo "API_KEY=any-api-key"                          >> ./apps/local-auth/.env

    - name: Run Playwright tests
      run: npx playwright test
      env:
        BASE_URL: http://localhost:3000
        AUTH_USERNAME_PASSWORD_URL: http://localhost:3003/
        AUTH_AUTH0_ISSUER: http://localhost:3002/
        AUTH0_ISSUER_BASE_URL: http://localhost:3002/
        AUTH_AUTH0_TOKEN_ENDPOINT: http://localhost:3002/oauth/token
        AUTH_AUTH0_SECRET: dummy-secret-123456789
        AUTH_AUTH0_ID: ${{ secrets.AUTH_AUTH0_ID }}
        SERVICE_TASKSYNC: http://localhost:8080
        AUTH_AUDIENCE: https://tasksync.api.de/api
        NODE_TLS_REJECT_UNAUTHORIZED: 0
        NODE_ENV: development
        LOCAL_AUTH_API_KEY: any-api-key

    # - name: Debugging - Print backend logs
    #  if: ${{ always() }}
    #  run: |
    #    docker logs ${{ env.BACKEND_CONTAINER }} 2>&1 || echo "Container not found"

    - uses: actions/upload-artifact@v6
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14

    # Cleanup running docker services
    # Checkout .NET Backend again, because files are no longer available
    - name: Again, Checkout .NET Backend
      uses: actions/checkout@v5
      with:
        repository: kemalk89/TaskSync
        path: dotnet-backend
    - name: Cleanup containers
      if: always()
      run: |
        docker rm -f ${{ env.BACKEND_CONTAINER }} || true
    - name: Shutdown Docker services
      run: docker compose down
      working-directory: dotnet-backend

